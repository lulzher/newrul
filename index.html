    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --border: #2a2a2a;
            --text: #f0f0f0;
            --muted: #666;
            --accent: #ff4757;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
            position: relative;
            overflow-x: hidden;
        }

        /* 배경 그라디언트 */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255,71,87,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        /* 헤더 */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 42px;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff 0%, #ff4757 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .logo-sub {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* 입력 박스 */
        .input-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 460px;
            margin-bottom: 28px;
        }

        .input-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .input-card textarea {
            width: 100%;
            height: 64px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--text);
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-card textarea:focus { border-color: var(--accent); }
        .input-card textarea::placeholder { color: var(--muted); }

        .apply-btn {
            margin-top: 12px;
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .apply-btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .apply-btn:active { transform: translateY(0); }

        /* 메인 레이아웃 */
        .main-layout {
            display: flex;
            align-items: center;
            gap: 36px;
            position: relative;
        }

        /* 사이드 버튼 */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }


        /* 룰렛 */
        .roulette-wrap {
            position: relative;
        }

        .pointer {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 32px solid #ff4757;
            z-index: 10;
            filter: drop-shadow(0 2px 8px rgba(255,71,87,0.6));
        }

        .roulette-ring {
            background: var(--surface);
            border: 6px solid var(--border);
            border-radius: 50%;
            padding: 8px;
            box-shadow:
                0 0 0 1px rgba(255,71,87,0.2),
                0 30px 80px rgba(0,0,0,0.6);
        }

        canvas {
            border-radius: 50%;
            display: block;
        }

        /* 하단 버튼 */
        .footer-btns {
            display: flex;
            gap: 14px;
            margin-top: 36px;
        }

        .btn-spin {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 16px 56px;
            font-size: 20px;
            font-weight: 700;
            font-family: 'Black Han Sans', sans-serif;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255,71,87,0.35);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn-spin:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(255,71,87,0.5);
        }

        .btn-spin:active { transform: translateY(0); }

        .btn-reset {
            background: var(--surface);
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 28px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }

        .btn-reset:hover { color: var(--text); border-color: #555; }

        /* 결과 팝업 */
        .result-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .result-overlay.show { display: flex; }

        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 56px;
            text-align: center;
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .result-emoji { font-size: 56px; margin-bottom: 16px; }
        .result-label { font-size: 13px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
        .result-name {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 52px;
            background: linear-gradient(135deg, #fff, #ff4757);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 32px;
        }

        .result-close {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .result-close:hover { opacity: 0.85; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">LULZET</div>
        <div class="logo-sub">Smart Random Roulette</div>
    </div>

    <div class="input-card">
        <span class="input-label">항목 입력 — 쉼표로 구분</span>
        <textarea id="nameInput" placeholder="예: 홍길동, 김예시, 이름일, 박철수"></textarea>
        <button class="apply-btn" onclick="applyNames()">✅ 룰렛에 적용하기</button>
    </div>

    <div class="main-layout">
        <div class="roulette-wrap">
            <div class="pointer"></div>
            <div class="roulette-ring">
                <canvas id="rouletteCanvas" width="460" height="460"></canvas>
            </div>
        </div>
    </div>

    <div class="footer-btns">
        <button class="btn-reset" onclick="resetAll()">초기화</button>
        <button class="btn-spin" id="spinBtn">돌리기!</button>
    </div>

    <!-- 결과 팝업 -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-card">
            <div class="result-emoji">🎊</div>
            <div class="result-label">당첨</div>
            <div class="result-name" id="resultName"></div>
            <button class="result-close" onclick="closeResult()">확인</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');

        // 컬러풀한 팔레트
        const palette = [
            '#ff4757','#ff6348','#ffa502','#eccc68',
            '#2ed573','#1e90ff','#7bed9f','#a29bfe',
            '#fd79a8','#00cec9','#e17055','#74b9ff'
        ];

        let items = ["피자", "치킨", "초밥", "삼겹살", "냉면", "마라탕"];
        let currentRotation = 0;
        let isSpinning = false;

        function draw() {
            const num = items.length;
            const arc = (Math.PI * 2) / num;
            const cx = 230, cy = 230, r = 225;
            ctx.clearRect(0, 0, 460, 460);

            items.forEach((item, i) => {
                const angle = i * arc;
                // 섹션
                ctx.beginPath();
                ctx.fillStyle = palette[i % palette.length];
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, angle, angle + arc);
                ctx.fill();

                // 구분선
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(0,0,0,0.25)';
                ctx.lineWidth = 2;
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, angle, angle + arc);
                ctx.stroke();

                // 텍스트
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.font = `bold ${Math.max(11, Math.min(18, 260/num))}px 'Noto Sans KR', sans-serif`;
                ctx.fillText(item, r - 16, 6);
                ctx.restore();
            });

            // 중앙 원
            ctx.beginPath();
            ctx.arc(cx, cy, 18, 0, Math.PI * 2);
            ctx.fillStyle = '#0d0d0d';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function applyNames() {
            const input = document.getElementById('nameInput').value;
            const newItems = input.split(",").map(s => s.trim()).filter(s => s.length > 0);
            if (newItems.length < 2) { alert("최소 2개 이상 입력해주세요!"); return; }
            items = newItems;
            currentRotation = 0;
            canvas.style.transition = "none";
            canvas.style.transform = `rotate(0deg)`;
            draw();
        }

        function resetAll() {
            if (isSpinning) return;
            items = ["피자", "치킨", "초밥", "삼겹살", "냉면", "마라탕"];
            currentRotation = 0;
            canvas.style.transition = "none";
            canvas.style.transform = `rotate(0deg)`;
            document.getElementById('nameInput').value = '';
            draw();
        }

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.style.opacity = '0.5';

            const spinDegree = Math.floor(Math.random() * 3600) + 3600;
            currentRotation += spinDegree;

            canvas.style.transition = "transform 5s cubic-bezier(0.15, 0, 0.15, 1)";
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                spinBtn.style.opacity = '1';
                const actual = currentRotation % 360;
                const seg = 360 / items.length;
                const idx = Math.floor(((270 - actual + 360) % 360) / seg);
                showResult(items[idx]);
            }, 5100);
        });

        function showResult(name) {
            document.getElementById('resultName').textContent = name;
            document.getElementById('resultOverlay').classList.add('show');
        }

        function closeResult() {
            document.getElementById('resultOverlay').classList.remove('show');
        }



        window.onload = draw;
    </script>
</body>
</html>
