```html
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LULZET - 스마트 커스텀 룰렛</title>
    <style>
        body { background-color: #f1f3f5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Pretendard', sans-serif; margin: 0; }
        
        .header-box { background: #000; color: #fff; padding: 15px 40px; border-radius: 50px; font-size: 26px; font-weight: 800; margin-bottom: 30px; border: none; width: 400px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); outline: none; }

        .main-layout { display: flex; align-items: center; justify-content: center; gap: 50px; position: relative; }

        .side-panel { display: flex; flex-direction: column; gap: 15px; }
        .btn-action { background: #000; color: #fff; padding: 15px 20px; border-radius: 12px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; width: 150px; transition: 0.2s; }
        .btn-action:hover { transform: scale(1.05); }
        .btn-record { background: #ff4757 !important; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        #timer-status { display: none; color: #ff4757; font-weight: bold; margin-top: 10px; text-align: center; font-size: 18px; }
        .blink { width: 10px; height: 10px; background: #ff4757; border-radius: 50%; display: inline-block; animation: blink-anim 1s infinite; }
        @keyframes blink-anim { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .name-input-box { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; margin-bottom: 25px; }
        .name-input-box label { font-size: 13px; font-weight: 700; color: #555; display: block; margin-bottom: 8px; }
        .name-input-box textarea { width: 100%; height: 70px; border: 2px solid #ddd; border-radius: 10px; padding: 10px; font-size: 14px; resize: none; box-sizing: border-box; font-family: inherit; outline: none; }
        .name-input-box textarea:focus { border-color: #000; }
        .name-input-box button { margin-top: 10px; background: #000; color: #fff; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; }
        .name-input-box button:hover { background: #333; }

        .roulette-container { position: relative; padding: 10px; background: #fff; border-radius: 50%; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border: 8px solid #000; }
        .pointer { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #ff4757; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); z-index: 10; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3)); }
        canvas { border-radius: 50%; display: block; }

        .footer-btns { margin-top: 40px; display: flex; gap: 20px; }
        .btn-main { background: #000; color: #fff; padding: 18px 60px; border-radius: 15px; font-size: 22px; font-weight: 700; border: none; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .btn-reset { background: #adb5bd !important; padding: 18px 30px; }
    </style>
</head>
<body>

    <input type="text" class="header-box" value="오늘의 랜덤 룰렛">

    <div class="name-input-box">
        <label>👤 이름을 쉼표로 구분해서 입력하세요</label>
        <textarea id="nameInput" placeholder="예: 홍길동, 김예시, 이름일, 박철수"></textarea>
        <button onclick="applyNames()">✅ 룰렛에 적용하기</button>
    </div>

    <div class="main-layout">
        <div class="side-panel">
            <button class="btn-action btn-record" id="recordBtn">🎥 녹화 시작</button>
            <div id="timer-status"><span class="blink"></span> <span id="timeDisplay">00:00</span></div>
        </div>

        <div class="roulette-container">
            <div class="pointer"></div>
            <canvas id="rouletteCanvas" width="500" height="500"></canvas>
        </div>
    </div>

    <div class="footer-btns">
        <button class="btn-main btn-reset" onclick="resetAll()">초기화</button>
        <button class="btn-main" id="spinBtn">룰렛 돌리기!</button>
    </div>

    <script>
        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const recordBtn = document.getElementById('recordBtn');
        const timerStatus = document.getElementById('timer-status');
        const timeDisplay = document.getElementById('timeDisplay');

        let items = ["피자", "치킨", "초밥", "삼겹살", "냉면", "마라탕"];
        const colors = ["#1a1a1a", "#2e2e2e", "#444444", "#5a5a5a", "#707070", "#868686"];
        let currentRotation = 0;
        let isSpinning = false;

        function draw() {
            const num = items.length;
            const arc = (Math.PI * 2) / num;
            ctx.clearRect(0, 0, 500, 500);

            items.forEach((item, i) => {
                const angle = i * arc;
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, angle, angle + arc);
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 18px sans-serif";
                ctx.fillText(item, 230, 10);
                ctx.restore();
            });

            ctx.beginPath();
            ctx.arc(250, 250, 15, 0, Math.PI * 2);
            ctx.fillStyle = "#000";
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function applyNames() {
            const input = document.getElementById('nameInput').value;
            const newItems = input.split(",").map(s => s.trim()).filter(s => s.length > 0);
            if (newItems.length < 2) {
                alert("최소 2명 이상 입력해주세요!");
                return;
            }
            items = newItems;
            currentRotation = 0;
            canvas.style.transition = "none";
            canvas.style.transform = `rotate(0deg)`;
            draw();
        }

        function resetAll() {
            if (isSpinning) return;
            items = ["피자", "치킨", "초밥", "삼겹살", "냉면", "마라탕"];
            currentRotation = 0;
            canvas.style.transition = "none";
            canvas.style.transform = `rotate(0deg)`;
            document.getElementById('nameInput').value = '';
            draw();
        }

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            const spinDegree = Math.floor(Math.random() * 3600) + 3600;
            currentRotation += spinDegree;
            
            canvas.style.transition = "transform 5s cubic-bezier(0.15, 0, 0.15, 1)";
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                const actualRotation = currentRotation % 360;
                const segmentAngle = 360 / items.length;
                const winningIndex = Math.floor(((270 - actualRotation + 360) % 360) / segmentAngle);
                alert(`🎊 결과: [${items[winningIndex]}] 🎊`);
            }, 5000);
        });

        let mediaRecorder;
        let recordedChunks = [];
        let startTime;
        let timerInterval;

        recordBtn.addEventListener('click', () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                recordedChunks = [];
                const stream = canvas.captureStream(30);
                const types = ['video/mp4;codecs=h264', 'video/webm;codecs=vp9', 'video/webm'];
                const supportedType = types.find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';

                mediaRecorder = new MediaRecorder(stream, { 
                    mimeType: supportedType,
                    videoBitsPerSecond: 5000000
                });

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: supportedType });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    const ext = supportedType.includes('mp4') ? 'mp4' : 'webm';
                    a.href = url;
                    a.download = `LULZET_Record_${Date.now()}.${ext}`;
                    a.click();
                    URL.revokeObjectURL(url);
                };

                mediaRecorder.start();
                recordBtn.innerHTML = "⏹ 녹화 중지";
                timerStatus.style.display = "block";
                startTime = Date.now();
                timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - startTime) / 1000);
                    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
                    const s = String(elapsed % 60).padStart(2, '0');
                    timeDisplay.innerText = `${m}:${s}`;
                }, 1000);
            } else {
                mediaRecorder.stop();
                recordBtn.innerHTML = "🎥 녹화 시작";
                timerStatus.style.display = "none";
                clearInterval(timerInterval);
            }
        });

        window.onload = draw;
    </script>
</body>
</html>
